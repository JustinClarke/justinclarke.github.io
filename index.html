<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Justin Clarke - Data Analyst & Full-Stack Engineer. Specialized in building end-to-end data pipelines, interactive dashboards, and high-performance web applications." />
  <title>Justin Clarke</title>

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://justinclarke.github.io/">
  <meta property="og:title" content="Justin Clarke">
  <meta property="og:description"
    content="Data Analyst & Full-Stack Engineer specializing in high-performance data pipelines and interactive dashboards.">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://justinclarke.github.io/">
  <meta property="twitter:title" content="Justin Clarke">
  <meta property="twitter:description"
    content="Data Analyst & Full-Stack Engineer specializing in high-performance data pipelines and interactive dashboards.">

  <!-- GitHub Pages 404 Redirect Handler -->
  <script type="text/javascript">
    (function (l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>

  <!-- Browser Theme & Icons -->
  <meta name="theme-color" content="#00c8b4">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="mask-icon" href="/favicon.svg" color="#00c8b4">

  <!-- Font Preconnect & Critical Loading Optimization -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Critical: Preload only core structural fonts (Inter and JetBrains Mono) -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Non-Critical: Load stylistic fonts (Serif, Plex, Noto) asynchronously -->
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100..700;1,100..700&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=DM+Serif+Text:ital@0;1&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100..700;1,100..700&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=DM+Serif+Text:ital@0;1&display=swap" rel="stylesheet">
  </noscript>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
